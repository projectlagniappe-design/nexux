<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Entry</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:#061421; font-family:system-ui; }

#ui {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

.lang-btn {
  margin:6px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid #44ccff;
  background:transparent;
  color:#88ddff;
  cursor:pointer;
}

.lang-btn:hover {
  background:#44ccff;
  color:#001122;
}

#englishStatic {
  position:absolute;
  top:20px;
  right:20px;
  background:#ffee88;
  color:#112233;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="ui"></div>
<button id="englishStatic">English</button>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= ORB =================
const orbGeo = new THREE.SphereGeometry(1.2, 64, 64);
const orbMat = new THREE.MeshStandardMaterial({
  color: 0x00ccff,
  emissive: 0x0077aa,
  emissiveIntensity: 1.5
});
const orb = new THREE.Mesh(orbGeo, orbMat);
scene.add(orb);

// light
const light = new THREE.PointLight(0x00ccff, 2);
light.position.set(5,5,5);
scene.add(light);

// ================= LANGUAGES =================
const languages = [
  "English","Español","Français","Italiano",
  "Nederlands","العربية","中文","日本語","한국어"
];

let textMeshes = [];

languages.forEach((lang, i) => {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 512;
  canvas.height = 128;

  ctx.fillStyle = "#00ccff";
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.fillText(lang, 256, 64);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex });
  const sprite = new THREE.Sprite(mat);

  const angle = (i / languages.length) * Math.PI * 2;
  sprite.position.set(Math.cos(angle)*3, Math.sin(angle)*1.5, 0);

  scene.add(sprite);
  textMeshes.push(sprite);

  // CLICK SELECT
  sprite.userData.lang = lang;
});

// ================= BUTTONS =================
const ui = document.getElementById("ui");

languages.forEach(lang => {
  const btn = document.createElement("button");
  btn.innerText = lang;
  btn.className = "lang-btn";
  btn.onclick = () => selectLanguage(lang);
  ui.appendChild(btn);
});

// STATIC ENGLISH BUTTON
document.getElementById("englishStatic").onclick = () => selectLanguage("English");

// ================= INTERACTION =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (e)=>{
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(textMeshes);

  if(hits.length){
    selectLanguage(hits[0].object.userData.lang);
  }
});

// ================= LANGUAGE SELECT =================
function selectLanguage(lang){
  console.log("Selected:", lang);

  // pulse orb
  gsap.to(orb.scale, {x:1.6, y:1.6, z:1.6, duration:0.4, yoyo:true, repeat:1});

  // dissolve text
  textMeshes.forEach(m => {
    gsap.to(m.scale, {x:0, y:0, duration:0.6});
  });

  setTimeout(()=>{
    createSeed();
  }, 800);
}

// ================= SEED TRANSFORMATION =================
function createSeed(){
  scene.remove(orb);

  const seedGeo = new THREE.IcosahedronGeometry(1.2, 2);
  const seedMat = new THREE.MeshStandardMaterial({
    color: 0xffcc66,
    emissive: 0xaa7722,
    emissiveIntensity: 1.2
  });

  const seed = new THREE.Mesh(seedGeo, seedMat);
  scene.add(seed);

  seed.userData.isSeed = true;

  // rotate
  gsap.to(seed.rotation, {y:Math.PI*2, repeat:-1, duration:6});

  // click seed
  window.addEventListener("click", ()=>{
    if(seed.userData.isSeed){
      enterNexus();
    }
  });
}

// ================= ENTER NEXUS =================
function enterNexus(){
  gsap.to(camera.position, {
    z:1,
    duration:1.5,
    onComplete: ()=>{
      window.location.href = "/nexus"; // connect to your existing system
    }
  });
}

// ================= ANIMATE =================
function animate(){
  requestAnimationFrame(animate);

  orb.rotation.y += 0.003;

  // rotate languages
  textMeshes.forEach((m, i)=>{
    const t = Date.now()*0.0005 + i;
    m.position.x = Math.cos(t)*3;
    m.position.z = Math.sin(t)*3;
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
